<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreeIncome Hub</title>

<script src='//libtl.com/sdk.js'
data-zone='11189850'
data-sdk='show_11189850'></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
padding:20px;
}

.header{
text-align:center;
margin-top:20px;
margin-bottom:20px;
}

.header h1{
color:#22c55e;
font-size:32px;
}

.header p{
color:#cbd5e1;
margin-top:8px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
text-align:center;
margin-bottom:20px;
}

.balance{
font-size:32px;
font-weight:bold;
color:#22c55e;
margin-top:10px;
}

.btn{
width:100%;
padding:16px;
border:none;
border-radius:12px;
margin-top:12px;
font-size:18px;
font-weight:bold;
color:white;
cursor:pointer;
}

.ads{
background:#ef4444;
}

.reward{
background:#22c55e;
}

.refer{
background:#3b82f6;
}

.withdraw{
background:#f59e0b;
}

.footer{
text-align:center;
margin-top:25px;
color:#94a3b8;
}
</style>
</head>

<body>

<div class="header">
<h1>💰 FreeIncome Hub</h1>
<p>Watch Ads & Earn Rewards</p>
</div>

<div class="card">
<h3>Your Balance</h3>
<div class="balance" id="balance">0 Tk</div>
</div>

<button class="btn ads" onclick="watchAd()">
📺 Watch Ads (+5 Tk)
</button>

<button class="btn reward" onclick="dailyReward()">
🎁 Daily Reward
</button>
<button class="btn refer" onclick="referPage()">
👥 Refer Friends
</button>
<button class="btn refer">


<button class="btn withdraw" onclick="withdrawPage()">
💸 Withdraw
</button>

<div class="footer">
FreeIncome Hub © 2026
</div>

<script>

let balance = parseInt(localStorage.getItem("balance") || "0");

updateBalance();

function updateBalance(){
document.getElementById("balance").innerText = balance + " Tk";
}

function watchAd(){
show_11189850().then(() => {

balance += 5;

localStorage.setItem("balance", balance);

updateBalance();

alert("5 Tk Added Successfully!");

});
}

function dailyReward(){

let lastClaim = localStorage.getItem("lastReward");
let now = Date.now();

if(lastClaim){

let diff = now - parseInt(lastClaim);

if(diff < 86400000){

alert("You already claimed today's reward!");
return;

}

}

balance += 2;

localStorage.setItem("balance", balance);
localStorage.setItem("lastReward", now);

updateBalance();

alert("Daily Reward Claimed!");

}

function withdrawPage(){

document.body.innerHTML = `

<div style="padding:20px;text-align:center;color:white;background:#0f172a;height:100vh;">

<h1>💸 Withdraw</h1>

<br>

<h2>Balance: ${balance} Tk</h2>

<br>

<p>Minimum Withdraw Cash: 200 Tk</p>

<br>

<select style="width:90%;padding:12px;border-radius:10px;">

<option>bKash</option>

<option>Nagad</option>

</select>

<br><br>

<input
type="text"
placeholder="Mobile Number"
style="width:90%;padding:12px;border-radius:10px;border:none;">

<br><br>

<input
type="number"
placeholder="Withdraw Amount"
style="width:90%;padding:12px;border-radius:10px;border:none;">

<br><br>

<button
onclick="submitWithdraw()"
style="padding:14px 25px;background:#22c55e;color:white;border:none;border-radius:10px;font-size:16px;">

Submit Withdraw

</button>

<br><br>

<button
onclick="location.reload()"
style="padding:12px 20px;border:none;border-radius:10px;">

⬅ Back

</button>

</div>

`;

}
function referPage(){

document.body.innerHTML = `

<div style="padding:20px;text-align:center;color:white;background:#0f172a;height:100vh;">

<h1>👥 Refer & Earn</h1>

<h2>10 Tk Per Referral</h2>

<p>Daily Referral Limit: 10 Friends</p>

<p>Maximum Daily Bonus: 100 Tk</p>

<br>

<input
type="text"
value="https://t.me/leifud_bot"
readonly
style="width:90%;padding:12px;border-radius:10px;border:none;">

<br><br>

<button
onclick="copyReferral()"
style="padding:12px 20px;background:#3b82f6;color:white;border:none;border-radius:10px;">

📋 Copy Referral Link

</button>

<br><br>

<button
onclick="location.reload()"
style="padding:12px 20px;border:none;border-radius:10px;">

⬅ Back

</button>

</div>

`;

}

function copyReferral(){

navigator.clipboard.writeText("https://t.me/leifud_bot");

alert("Referral Link Copied!");

}
function submitWithdraw(){

if(balance < 200){

alert("Minimum Withdraw Amount is 200 Tk");

return;

}

alert("Withdraw Request Submitted");

}

</script>

</body>
</html>
